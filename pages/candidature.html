<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page de candidature</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/candidature.css">
</head>

<body>

    
    <div id="navbar">
        
        <hr>
    </div>

    <div class="container">

        <h2>Formulaire de candidature</h2>

        <form>

            
            <fieldset>
                <legend>Informations de l'entreprise</legend>

                <div id="entreprise">
                    
                </div>
            </fieldset>

            
            <fieldset>
                <legend>Importer votre CV</legend>

                <label for="cv">Sélectionner un fichier :</label>
                <input type="file" id="cv" name="cv" required>
            </fieldset>

            
            <fieldset>
                <legend>Lettre de motivation</legend>

                <label for="motivation">Votre message :</label>
                <textarea id="motivation" name="motivation" required></textarea>
            </fieldset>

           
            <button type="submit">Envoyer</button>

        </form>

    </div>

</body>
</html>
