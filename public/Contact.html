<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - StageHub</title>
    <link rel="stylesheet" href="css/contact.css"
</head>
<body>

<div class="phone-frame">

    <div class="status-bar">
        <span class="status-bar-left">9:41</span>
        <span>Contact</span>
        <span class="status-bar-right">● ● ●</span>
    </div>

    <header class="header">
        <div class="logo">
            <div class="logo-icon"><img src="images/logo.png" alt="Logo StageHub"></div>
            InterStage
        </div>
        <button class="menu-icon" aria-label="Menu">☰</button>
    </header>

    <main class="content">

        <h1>Contactez-nous</h1>

        <form action="" method="POST">
            <fieldset>
                <legend class="sr-only">Formulaire de contact</legend>

                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="sujet">Sujet</label>
                    <select id="sujet" name="sujet">
                        <option value="">-- Choisir un sujet --</option>
                        <option value="info">Demande d'information</option>
                        <option value="probleme">Signaler un problème</option>
                        <option value="offre">Question sur une offre</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message"
                        placeholder="Écrivez votre message..." required></textarea>
                </div>
            </fieldset>

            <button type="submit" class="btn-submit">Envoyer le message</button>
        </form>

        <div class="contact-info">
            <p>Nos coordonnées</p>
            <ul>
                <li><span>Email :</span> Interstage@viacesi.fr</li>
                <li><span>Tél :</span> 00 00 00 00 00</li>
                <li><span>Adresse :</span> le paquebot, 44600 Saint-nazaire</li>
            </ul>
        </div>

        <div class="login-section">
            <a href="index.php">← Retour à l'accueil</a>
        </div>

    </main>

</div>

</body>
</html>
