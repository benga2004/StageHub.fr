<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inscription à StageHub">
    <title>Inscription - StageHub</title>
    <!-- Lien vers la feuille CSS -->
    <link rel="stylesheet" href="css/inscription.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-bar-left">3:03</div>
            <div class="status-bar-right">A B</div>
        </div>

        <header class="header">
            <div class="logo">
                <div class="logo-icon">Logo</div>
                <span>StageHub</span>
            </div>
            <button class="menu-icon" aria-label="Menu">☰</button>
        </header>

        <main class="content">
            <h1>Inscription</h1>

            <form action="#" method="POST">
                <fieldset>
                    <legend class="sr-only">Formulaire d'inscription</legend>
                    
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>

                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" required>
                    </div>

                    <div class="form-group">
                        <label for="telephone">Téléphone</label>
                        <input type="tel" id="telephone" name="telephone" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label for="password-confirm">Confirmation de mot de passe</label>
                        <input type="password" id="password-confirm" name="password-confirm" required>
                    </div>

                    <button type="submit" class="btn-submit">S'Inscrire</button>
                </fieldset>

                <div class="login-section">
                    <p>Vous avez déjà un compte?</p>
                    <a href="connexion.html">Connectez-vous</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
